# Dynamic schedule: study time = (22:00 - arrival_home) * 2/3
# Only activates AFTER user has been to the hospital that day
study_schedule:
  mode: "dynamic"  # "dynamic" or "fixed"
  end_of_day_hour: 22  # Study cutoff time
  useful_fraction: 0.6667  # 2/3 of remaining time
  # Fixed schedule fallback (used when mode is "fixed")
  fixed:
    monday:    ["08:00-12:00", "14:00-18:00"]
    tuesday:   ["08:00-12:00", "14:00-18:00"]
    wednesday: ["08:00-12:00", "14:00-18:00"]
    thursday:  ["08:00-12:00", "14:00-18:00"]
    friday:    ["08:00-12:00", "14:00-18:00"]
    saturday:  ["08:00-12:00"]
    sunday:    []

