name: "FocusGuard Backend"
version: "1.0.9"
slug: "focusguard-backend"
description: "Servidor e Dashboard do FocusGuard - Sistema Anti-procrastinação."
arch:
  - aarch64
  - amd64
startup: application
boot: auto
homeassistant_api: true
ingress: true
ingress_port: 8000
panel_icon: mdi:brain
panel_title: "FocusGuard"
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: "FocusGuard API (para o Tracker Windows)"
map:
  - config:rw
options:
  person_entity: "person.matheus_galvao"
  hospital_zone: "zone.hospital"
  ha_token: ""
schema:
  person_entity: str
  hospital_zone: str
  ha_token: str
